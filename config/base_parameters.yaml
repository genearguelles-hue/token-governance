metadata:
  label: base_parameters
  description: Base parameter state extracted from the current embedded Token Governance simulation model
  created_from: simulation/src/persona_token_governance_monte_carlo.py
  notes: >
    This file captures the current script-embedded baseline parameter state prior to
    config-driven calibration batches.

